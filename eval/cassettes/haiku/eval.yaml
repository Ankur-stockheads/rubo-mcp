    body: "{\"max_tokens\":1500,\"messages\":[{\"role\":\"user\",\"content\":\"Extract
      the tenant break clause, verbatim, from the document below.\\n\\n<document>\\n##
      Lease\\n\\nThis Lease is dated 24 June 2015 and is made between Greenfield Estates
      Limited (the \\\"Landlord\\\") and Aldgate Tea Company Limited (the \\\"Tenant\\\")
      in respect of Unit 4, Cromwell Business Park, Leeds (the \\\"Premises\\\").
      The term is ten years from and including 24 June 2015.\\n\\nClause 12 (Tenant's
      break right). The Tenant may terminate this Lease on 24 June 2025 (the \\\"Break
      Date\\\") by giving the Landlord not less than six months' prior written notice.
      Any such notice must be in writing and addressed to the Landlord at its registered
      office. It is a condition of the Tenant's right to break that, on the Break
      Date, (a) the Tenant has paid all rent and other sums due under the Lease and
      (b) the Tenant gives vacant possession of the Premises. Time is of the essence
      in relation to the notice period.\\n\\n## Background Facts\\n\\nThe Tenant decided
      in early 2025 to exercise the break. The Tenant served written notice on the
      Landlord on 5 March 2025, addressed to the Landlord at its registered office.
      All rent and other sums due under the Lease have been paid up to and including
      the Break Date. On the Break Date the Tenant removed all its goods and personnel
      and returned the keys to the Landlord's managing agent.\\n\\n</document>\"}],\"model\":\"claude-haiku-4-5\",\"output_config\":{\"format\":{\"schema\":{\"type\":\"object\",\"description\":\"The
      model's proposed break-clause extraction.\",\"title\":\"ClauseExtraction\",\"properties\":{\"found\":{\"type\":\"boolean\",\"description\":\"True
      if the document contains a tenant break clause.\",\"title\":\"Found\"},\"clause_quote\":{\"type\":\"string\",\"description\":\"The
      break clause copied VERBATIM, character-for-character, from the document. Do
      not paraphrase or correct. Empty string if not found.\\n\\n{default: }\",\"title\":\"Clause
      Quote\"}},\"additionalProperties\":false,\"required\":[\"found\"]},\"type\":\"json_schema\"}},\"system\":\"You
      are a meticulous paralegal assistant extracting a tenant's break clause from
      a UK commercial lease. This is decision-support, not legal advice.\\n\\nReturn
      the break clause copied VERBATIM \u2014 character-for-character \u2014 from
      the document. Never paraphrase, summarise, correct spelling, or invent text.
      If the document contains no tenant break clause, set found=false and leave the
      quote empty.\",\"temperature\":0}"
