      than nine months' prior written notice, conditional on the Tenant giving vacant
      possession of the Premises on the Break Date. For the avoidance of doubt, vacant
      possession requires the Tenant to procure the removal of any undertenant or
      licensee.\\n\\n## Background Facts\\n\\nThe Tenant served written notice on
