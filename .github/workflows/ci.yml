name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate the labelled dataset (verbatim spans + label coherence)
        run: uv run python scripts/validate_dataset.py

      - name: Run the test suite (proves the eval apparatus is correct)
        run: uv run pytest -q

      - name: Regenerate the eval report (key-free — heuristic baseline or cassette replay)
        run: uv run python scripts/run_eval.py
        env:
          # No ANTHROPIC_API_KEY in CI — the eval is reproducible without one.
          # Recorded cassettes (if committed) are replayed; otherwise the heuristic baseline runs.
          ANTHROPIC_API_KEY: ""
