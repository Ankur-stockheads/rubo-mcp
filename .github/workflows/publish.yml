name: Publish to PyPI

# Publishes the package when you cut a GitHub Release (tag like v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored anywhere.
#
# One-time setup before the first release:
#   1. Create a PyPI account.
#   2. PyPI → your account → Publishing → "Add a pending publisher":
#        PyPI project name: uk-break-clause-analyzer-mcp
#        Owner:             Ankur-stockheads
#        Repository:        rubo-mcp
#        Workflow name:     publish.yml
#        Environment:       pypi
#   3. GitHub repo → Settings → Environments → create an environment named "pypi".
# Then: create a Release (tag v0.1.0) and this workflow publishes automatically.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
