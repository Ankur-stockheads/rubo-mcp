name: Publish

# On a GitHub Release (tag like v0.1.1):
#   1. publish the package to PyPI via Trusted Publishing (OIDC, no token), then
#   2. publish the server metadata (server.json) to the official MCP Registry via
#      GitHub OIDC (no token either).
#
# One-time setup for step 1: a PyPI pending publisher (project
# uk-break-clause-analyzer-mcp, repo Ankur-stockheads/rubo-mcp, workflow
# publish.yml, environment pypi) + a GitHub environment named "pypi".
# Step 2 needs no setup — OIDC from this repo authorises the io.github.Ankur-stockheads/* namespace.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write # GitHub OIDC for the MCP Registry
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Wait for PyPI to index the new version
        run: sleep 45
      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to the MCP Registry
        run: ./mcp-publisher publish
